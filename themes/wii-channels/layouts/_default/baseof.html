<!DOCTYPE html>
<html lang="{{ site.Language.Lang | default `en` }}">
{{ partial "head.html" . }}
<body>
  <div class="wii-bubbles" aria-hidden="true">
    {{ range (seq 12) }}<span class="wii-bubble"></span>{{ end }}
  </div>
  <div class="wii-frame">
    {{ partial "header.html" . }}
    <main class="wii-main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
  <script src="{{ `js/clock.js` | relURL }}" defer></script>
  {{ if .Store.Get "hasMermaid" }}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      flowchart: { curve: 'basis', htmlLabels: true, padding: 16, subGraphTitleMargin: { top: 8, bottom: 16 } },
      themeVariables: {
        fontFamily: '"Varela Round", "Quicksand", sans-serif',
        fontSize: '15px',
        primaryColor: '#eafaff',
        primaryBorderColor: '#5ec8f5',
        primaryTextColor: '#2a4d63',
        lineColor: '#0078b4',
        secondaryColor: '#d6eefb',
        secondaryBorderColor: '#5ec8f5',
        secondaryTextColor: '#2a4d63',
        tertiaryColor: '#fdfdfd',
        tertiaryBorderColor: '#c5dbe8',
        clusterBkg: '#f3fbff',
        clusterBorder: '#5ec8f5',
        edgeLabelBackground: '#fdfdfd',
        nodeBorder: '#5ec8f5',
        titleColor: '#2a4d63',
        noteBkgColor: '#eafaff',
        noteBorderColor: '#5ec8f5'
      }
    });
    await mermaid.run({ querySelector: '.mermaid' });
  </script>
  {{ end }}
</body>
</html>
